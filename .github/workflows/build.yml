name: Build/Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite App
        run: npm run build

      - name: Package & Publish (Windows)
        if: matrix.platform == 'win'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Package & Publish (macOS)
        if: matrix.platform == 'mac'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mac code-signing is skipped (no Apple Developer cert); DMG will still be created
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish always
